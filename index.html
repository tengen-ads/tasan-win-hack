  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #2b0000 0%, #070707 60%, #000000 100%);
      overflow: hidden;
      padding: 20px;
    }

    .bg-glow {
      position: absolute;
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, rgba(0,255,100,0.25) 0%, transparent 70%);
      bottom: -120px;
      right: -120px;
      filter: blur(60px);
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 390px;
      background: #0b0b0b;
      border-radius: 28px;
      padding: 35px 25px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
      z-index: 2;
    }

    .title {
      color: #ff3131;
      font-size: 38px;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 28px;
    }

    .profile-wrap {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      margin: auto;
      padding: 6px;
      background: linear-gradient(135deg, #00ff66, #00ff95);
      box-shadow: 0 0 30px rgba(0,255,128,0.5);
    }

    .profile {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .sub-title {
      margin-top: 28px;
      color: #00ff66;
      font-size: 25px;
      font-weight: 700;
      line-height: 1.4;
    }

    .timer {
      margin-top: 18px;
      color: #ff3131;
      font-size: 72px;
      font-weight: 800;
      letter-spacing: 2px;
    }

    .live-box {
      margin-top: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      color: white;
      font-size: 20px;
      flex-wrap: wrap;
    }

    .dot {
      width: 18px;
      height: 18px;
      background: #ff3131;
      border-radius: 50%;
      box-shadow: 0 0 15px #ff3131;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% {
        opacity: 1;
      }
      50% {
        opacity: 0.3;
      }
      100% {
        opacity: 1;
      }
    }

    .users {
      color: #00ff66;
      font-weight: 700;
    }

    .join-btn {
      margin-top: 28px;
      width: 100%;
      padding: 20px;
      border: none;
      border-radius: 22px;
      background: linear-gradient(90deg, #ff1f1f, #25ff63);
      color: white;
      font-size: 28px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .join-btn:hover {
      transform: translateY(-3px) scale(1.02);
    }

    .vip-btn {
      margin-top: 22px;
      width: 100%;
      padding: 18px;
      border-radius: 22px;
      background: transparent;
      border: 3px solid #00ff66;
      color: #00ff66;
      font-size: 28px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .vip-btn:hover {
      background: rgba(0,255,100,0.08);
    }

    .footer {
      margin-top: 24px;
      color: #bfbfbf;
      font-size: 18px;
      font-weight: 400;
    }

    @media (max-width: 480px) {
      .card {
        padding: 28px 18px;
      }

      .title {
        font-size: 32px;
      }

      .profile-wrap {
        width: 145px;
        height: 145px;
      }

      .sub-title {
        font-size: 22px;
      }

      .timer {
        font-size: 58px;
      }

      .join-btn,
      .vip-btn {
        font-size: 24px;
      }
    }
  </style>

  <script>
    let seconds = 27;

    function updateTimer() {
      const timer = document.getElementById('timer');

      const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
      const secs = String(seconds % 60).padStart(2, '0');

      timer.innerText = `${mins}:${secs}`;

      if (seconds > 0) {
        seconds--;
      } else {
        seconds = 27;
      }
    }

    setInterval(updateTimer, 1000);
  </script>
